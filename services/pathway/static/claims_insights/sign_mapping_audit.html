<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Mapping Audit | Pathway Knowledge Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #ff8c42;
      --primary-glow: rgba(255, 140, 66, 0.3);
      --accent: #f06292;
      --bg: #0f1115;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --card-bg: rgba(30, 35, 45, 0.7);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 140, 66, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(240, 98, 146, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out;
    }

    .header-content h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ff8c42 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header-content p {
      color: var(--text-muted);
      font-size: 15px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .stat-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 10px 30px -10px var(--primary-glow);
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .filter-panel {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      height: fit-content;
      position: sticky;
      top: 30px;
    }

    .filter-group {
      margin-bottom: 25px;
    }

    .filter-group h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      color: var(--primary);
    }

    .status-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .status-pill:hover { background: rgba(255, 255, 255, 0.06); }
    .status-pill.active { background: var(--primary-glow); border-color: var(--primary); }

    .status-pill label { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.exact { background: var(--success); }
    .dot.probable { background: #3b82f6; }
    .dot.ambiguous { background: var(--warning); }
    .dot.unknown { background: var(--danger); }

    .content-panel {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 10px 16px;
      color: #fff;
      font-family: inherit;
      width: 300px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

    .table-container { overflow-x: auto; flex: 1; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 16px 24px; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); border-bottom: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.1);
    }
    td { padding: 18px 24px; border-bottom: 1px solid var(--glass-border); font-size: 14px; vertical-align: middle; }
    tr:hover { background: rgba(255, 255, 255, 0.02); }

    .mention-text { font-weight: 700; color: #fff; }
    .count-badge { background: var(--glass-border); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
    .candidate-list { display: flex; flex-direction: column; gap: 6px; }
    .candidate-item {
      display: flex; align-items: center; gap: 8px; font-size: 13px;
      padding: 4px 10px; background: rgba(255, 255, 255, 0.03);
      border-radius: 8px; border: 1px solid transparent; cursor: pointer;
    }
    .candidate-item:hover { border-color: var(--primary); background: var(--primary-glow); }
    .score { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--primary); margin-left: auto; }

    .pagination { padding: 20px 24px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid var(--glass-border); }
    .page-btn { background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; }
    .page-btn:hover { background: var(--glass-border); }
    .page-btn.active { background: var(--primary); border-color: var(--primary); }

    .loader { width: 40px; height: 40px; border: 3px solid var(--glass-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 100px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div class="container" id="app">
    <header>
      <div class="header-content">
        <h1>Mapping Audit UI</h1>
        <p>Hệ thống chuẩn hóa & đối soát mã dịch vụ y tế bằng AI</p>
      </div>
    </header>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Tổng Mentions</div>
        <div class="stat-value" id="statTotal">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cần Review</div>
        <div class="stat-value" id="statReview" style="color: var(--warning);">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tỷ lệ Chấp nhận</div>
        <div class="stat-value" id="statAccuracy" style="color: var(--success);">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Case Đã Xử Lý</div>
        <div class="stat-value" id="statCases">-</div>
      </div>
    </div>

    <div class="main-layout">
      <aside class="filter-panel">
        <div class="filter-group">
          <h3>Trạng thái Mapping</h3>
          <div class="status-pill" data-status="exact">
            <label><span class="dot exact"></span> Exact Match</label>
            <span id="countExact" class="count-badge">-</span>
          </div>
          <div class="status-pill" data-status="probable">
            <label><span class="dot probable"></span> Probable</label>
            <span id="countProbable" class="count-badge">-</span>
          </div>
          <div class="status-pill active" data-status="ambiguous">
            <label><span class="dot ambiguous"></span> Ambiguous</label>
            <span id="countAmbiguous" class="count-badge">-</span>
          </div>
          <div class="status-pill" data-status="unknown">
            <label><span class="dot unknown"></span> Unknown</label>
            <span id="countUnknown" class="count-badge">-</span>
          </div>
        </div>
      </aside>

      <section class="content-panel">
        <div class="panel-header">
          <h2 id="tableHeading">Ambiguous Mentions</h2>
          <input type="text" class="search-box" placeholder="Tìm kiếm dịch vụ..." id="tableSearch">
        </div>

        <div class="table-container">
          <table id="mappingTable">
            <thead>
              <tr>
                <th>Mention Text</th>
                <th>Tần suất</th>
                <th>Gợi ý AI (Top Candidates)</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="4"><div class="loader"></div></td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination" id="pagination"></div>
      </section>
    </div>
  </div>

  <script>
    const API = {
      summary: '/api/claims-insights/mapping-audit/summary',
      data: '/api/claims-insights/mapping-audit/grouped-review'
    };

    let state = { summary: null, rows: [], currentPage: 1, currentStatus: 'ambiguous' };

    async function loadSummary() {
      try {
        const res = await fetch(API.summary);
        state.summary = await res.json();
        updateStats();
      } catch (err) { console.error(err); }
    }

    function updateStats() {
      const s = state.summary; if (!s) return;
      document.getElementById('statTotal').textContent = s.sign_mentions_total.toLocaleString();
      document.getElementById('statReview').textContent = s.review_queue_count.toLocaleString();
      document.getElementById('statAccuracy').textContent = (s.accepted_rate * 100).toFixed(1) + '%';
      document.getElementById('statCases').textContent = s.cases_processed.toLocaleString();
      document.getElementById('countExact').textContent = s.status_counter.exact || 0;
      document.getElementById('countProbable').textContent = s.status_counter.probable || 0;
      document.getElementById('countAmbiguous').textContent = s.status_counter.ambiguous || 0;
      document.getElementById('countUnknown').textContent = s.status_counter.unknown || 0;
    }

    async function loadData() {
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = '<tr><td colspan="4"><div class="loader"></div></td></tr>';
      try {
        const url = `${API.data}?status=${state.currentStatus}&page=${state.currentPage}&page_size=20`;
        const res = await fetch(url);
        const data = await res.json();
        state.rows = data.rows;
        renderRows();
        renderPagination(data.total, 20);
      } catch (err) { console.error(err); }
    }

    function renderRows() {
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = state.rows.map(row => `
        <tr>
          <td><div class="mention-text">${escapeHtml(row.normalized_sign)}</div></td>
          <td><span class="count-badge">${row.mention_count} lần</span></td>
          <td>
            <div class="candidate-list">
              ${(row.top_candidates || []).map(c => `
                <div class="candidate-item">
                  <strong>${c.sign_id}</strong>: ${c.sign_label} <span class="score">${c.count} hits</span>
                </div>
              `).join('')}
            </div>
          </td>
          <td><button class="page-btn">Chọn mã...</button></td>
        </tr>
      `).join('');
    }

    function renderPagination(total, pageSize) {
      const pagEl = document.getElementById('pagination');
      const maxPages = Math.ceil(total / pageSize);
      let html = '';
      for (let i = 1; i <= Math.min(maxPages, 10); i++) {
        html += `<button class="page-btn ${i === state.currentPage ? 'active' : ''}" onclick="state.currentPage=${i}; loadData()">${i}</button>`;
      }
      pagEl.innerHTML = html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.querySelectorAll('.status-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        state.currentStatus = pill.dataset.status;
        state.currentPage = 1;
        loadData();
      });
    });

    loadSummary(); loadData();
  </script>
</body>
</html>
