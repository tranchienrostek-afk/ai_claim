name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Runner: $(whoami)@$(hostname)"
          echo "Workspace: $GITHUB_WORKSPACE"
          docker --version
          docker compose version

      - name: Build and deploy
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f .env ]; then
            echo ".env not found in checkout — checking deploy dir"
            if [ -f /home/runner/workspace/ai_claim/.env ]; then
              cp /home/runner/workspace/ai_claim/.env .env
              echo "Copied .env from deploy dir"
            else
              echo "WARNING: No .env found anywhere, app may fail to start"
            fi
          fi
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          echo "Containers:"
          docker ps --filter name=ai_claim --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9780/health > /dev/null 2>&1; then
              echo "ai_claim is UP"
              curl -s http://localhost:9780/health
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          docker compose logs --tail 30
          exit 1
