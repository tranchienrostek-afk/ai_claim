name: Deploy to Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    env:
      DEPLOY_DIR: /home/runner/workspace/ai_claim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to deploy directory
        run: |
          set -e
          echo "=== Deploy on $(hostname) ==="

          # Ensure deploy dir exists
          mkdir -p $DEPLOY_DIR

          # Sync code (rsync from checkout to deploy dir)
          rsync -a --delete \
            --exclude='.env' \
            --exclude='data/runtime/' \
            --exclude='data/duel_runs/' \
            --exclude='data/imported_runs/' \
            --exclude='data/benchmarks/' \
            --exclude='graphify-out/' \
            $GITHUB_WORKSPACE/ $DEPLOY_DIR/

          echo "Code synced to $DEPLOY_DIR"

      - name: Verify .env
        run: |
          if [ ! -f $DEPLOY_DIR/.env ]; then
            echo "ERROR: .env not found at $DEPLOY_DIR/.env"
            echo "Create it first:"
            echo "  cp $DEPLOY_DIR/configs/app.env.example $DEPLOY_DIR/.env"
            echo "  nano $DEPLOY_DIR/.env  # fill real values"
            exit 1
          fi
          echo ".env found"

      - name: Build and restart
        run: |
          cd $DEPLOY_DIR
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          echo "=== Docker status ==="
          docker ps --filter name=ai_claim

          echo "=== Waiting for health check ==="
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9780/health > /dev/null 2>&1; then
              echo "ai_claim is UP"
              curl -s http://localhost:9780/health | python3 -m json.tool
              exit 0
            fi
            sleep 2
          done

          echo "FAILED: health check timed out after 60s"
          cd $DEPLOY_DIR && docker compose logs --tail 30
          exit 1
