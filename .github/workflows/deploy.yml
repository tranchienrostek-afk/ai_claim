name: Deploy to Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            echo "=== Connected to $(hostname) ==="

            # Ensure deploy path exists
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/tranchienrostek-afk/ai_claim.git .
            fi

            # Verify .env exists
            if [ ! -f .env ]; then
              echo "ERROR: .env not found at ${{ secrets.DEPLOY_PATH }}/.env"
              echo "Create it from configs/app.env.example before deploying."
              exit 1
            fi

            # Build and restart
            docker compose down || true
            docker compose up -d --build

            # Diagnostics
            echo "=== Docker status ==="
            docker ps --filter name=ai_claim

            # Health check (wait up to 60s)
            echo "=== Health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:9780/health > /dev/null 2>&1; then
                echo "ai_claim is UP"
                curl -s http://localhost:9780/health | python3 -m json.tool
                exit 0
              fi
              sleep 2
            done
            echo "WARNING: health check timed out"
            docker compose logs --tail 30
            exit 1
