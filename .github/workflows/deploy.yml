name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Runner: $(whoami)@$(hostname)"
          echo "Workspace: $GITHUB_WORKSPACE"
          docker --version
          docker compose version

      - name: Create .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf "%s" "$ENV_FILE" > .env
            echo "Successfully created .env from GitHub Secrets."
          elif [ -f /home/runner/.env.ai_claim ]; then
            cp /home/runner/.env.ai_claim .env
            echo "Copied .env from host fallback."
          else
            touch .env
            echo "WARNING: No ENV_FILE secret or host .env found. Using empty .env (fail fast expected)."
          fi

      - name: Validate env
        run: |
          if [ ! -s .env ]; then
            echo "Error: .env is empty or missing!"
            exit 1
          fi
          # Check for critical keys to avoid half-alive deployment
          CRITICAL_KEYS=("AZURE_OPENAI_API_KEY" "NEO4J_URI" "PATHWAY_API_BASE_URL")
          for key in "${CRITICAL_KEYS[@]}"; do
            if ! grep -q "^$key=" .env; then
              echo "Error: Critical key $key is missing in .env!"
              exit 1
            fi
          done
          echo "Environment validation passed."

      - name: Build and deploy
        run: |
          cd $GITHUB_WORKSPACE
          docker compose --env-file .env down || true
          docker compose --env-file .env up -d --build

      - name: Health check
        run: |
          echo "Checking container status..."
          docker ps --filter name=ai_claim --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9780/health > /dev/null 2>&1; then
              echo "ai_claim is responding"
              curl -s http://localhost:9780/health
              echo ""
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Smoke test
        run: |
          echo "Ensuring test dependencies are installed on runner host..."
          pip install httpx --quiet
          echo "Running business logic smoke tests..."
          python scripts/deploy_smoke_test.py

      - name: On failure
        if: failure()
        run: |
          echo "Deployment or tests failed. Printing logs..."
          docker compose logs --tail 200
